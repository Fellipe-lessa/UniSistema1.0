<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultar Aluno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 40px; display: flex; align-items: center; height: 60px; gap: 32px; }
        nav .brand { font-size: 18px; font-weight: 600; color: #90caf9; margin-right: 16px; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .page-header { background: #1a237e; padding: 36px 40px 60px; }
        .page-header h1 { font-size: 28px; color: #fff; font-weight: 600; margin-bottom: 6px; }
        .page-header p { font-size: 14px; color: rgba(255,255,255,0.6); }
        .content { max-width: 860px; margin: -32px auto 40px; padding: 0 40px; }
        .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; padding: 28px; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 11px 14px; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; }
        .search-bar input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.08); background: #fff; }
        .btn { padding: 11px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.88; }
        .btn-primary { background: #1a237e; color: #fff; }
        .alert { padding: 12px 18px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .alert-danger { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .profile { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 0.5px solid #eee; }
        .avatar-lg { width: 60px; height: 60px; border-radius: 50%; background: #e8eaf6; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #3949ab; }
        .profile-info h2 { font-size: 20px; font-weight: 600; color: #1a237e; }
        .profile-info p { font-size: 13px; color: #888; margin-top: 3px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .info-item { background: #f8f9ff; border-radius: 8px; padding: 14px 16px; }
        .info-item label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
        .info-item p { font-size: 14px; color: #333; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { border-bottom: 2px solid #e8eaf6; }
        th { padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 13px 14px; border-bottom: 0.5px solid #f0f0f0; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f5f7ff; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger  { background: #ffebee; color: #c62828; }
        .badge-warn    { background: #fff8e1; color: #f57f17; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="page-header">
    <h1>Consultar Aluno</h1>
    <p>Busque um aluno pela matrícula</p>
</div>

<div class="content">
    <div class="card">
        <form th:action="@{/alunos/consultar}" method="get">
            <div class="search-bar">
                <input type="text" name="matricula" placeholder="Digite a matrícula do aluno..." required/>
                <button type="submit" class="btn btn-primary"><i class="ti ti-search"></i> Buscar</button>
            </div>
        </form>
        <div th:if="${erro}" class="alert alert-danger"><i class="ti ti-alert-circle"></i> <span th:text="${erro}"></span></div>
    </div>

    <div th:if="${aluno != null}" class="card">
        <div class="profile">
            <div class="avatar-lg" th:text="${#strings.substring(aluno.nome,0,2).toUpperCase()}"></div>
            <div class="profile-info">
                <h2 th:text="${aluno.nome}"></h2>
                <p>Aluno cadastrado no sistema</p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>Matrícula</label>
                <p th:text="${aluno.matricula}"></p>
            </div>
            <div class="info-item">
                <label>Data de Ingresso</label>
                <p th:text="${aluno.dataIngresso}"></p>
            </div>
            <div class="info-item" style="grid-column: span 2">
                <label>Endereço</label>
                <p th:text="${aluno.endereco}"></p>
            </div>
        </div>

        <div class="section-title"><i class="ti ti-book"></i> Matérias Matriculadas</div>

        <div th:if="${materias != null and !materias.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Matéria</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Média</th>
                        <th>Situação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${materias}">
                        <td th:text="${m.alunoNome}"></td>
                        <td th:text="${m.nota1 != null ? m.nota1 : '-'}"></td>
                        <td th:text="${m.nota2 != null ? m.nota2 : '-'}"></td>
                        <td th:text="${m.nota3 != null ? m.nota3 : '-'}"></td>
                        <td th:text="${m.media != null ? #numbers.formatDecimal(m.media,1,2) : '-'}"></td>
                        <td>
                            <span th:if="${m.media == null}" class="badge badge-warn">Aguardando</span>
                            <span th:if="${m.media != null and m.aprovado}" class="badge badge-success">✓ Aprovado</span>
                            <span th:if="${m.media != null and !m.aprovado}" class="badge badge-danger">✗ Reprovado</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${materias == null or materias.isEmpty()}" style="color:#aaa;font-size:14px;padding:20px 0">
            Este aluno não está matriculado em nenhuma turma ainda.
        </p>
    </div>
</div>
</body>
</html>
