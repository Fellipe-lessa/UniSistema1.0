<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%231a237e'/><polygon points='50,15 85,35 50,55 15,35' fill='white'/><polygon points='42,55 58,55 54,75 46,75' fill='white'/><circle cx='50' cy='35' r='5' fill='%2390caf9'/><line x1='75' y1='35' x2='75' y2='70' stroke='%2390caf9' stroke-width='3'/><circle cx='75' cy='70' r='5' fill='%2390caf9'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Aluno · UniSistema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav {
            background: #1a237e; padding: 0 40px;
            display: flex; align-items: center; height: 60px; gap: 32px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        nav .brand { font-size: 18px; font-weight: 600; color: #90caf9; margin-right: 16px; display: flex; align-items: center; gap: 8px; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; display: flex; align-items: center; gap: 6px; }
        nav a:hover { background: rgba(255,255,255,0.15); opacity: 1; }
        nav a.active { background: rgba(255,255,255,0.18); opacity: 1; }
        nav a i { font-size: 16px; }
        .nav-status { margin-left: auto; display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.75); font-size: 12px; padding: 5px 13px; border-radius: 999px; }
        .nav-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }

        .page-header { background: #1a237e; padding: 32px 40px 48px; }
        .page-header-inner { max-width: 640px; margin: 0 auto; }
        .page-header .breadcrumb { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .page-header .breadcrumb a { color: rgba(255,255,255,0.6); text-decoration: none; }
        .page-header .breadcrumb a:hover { color: #fff; }
        .page-header h1 { font-size: 24px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
        .page-header p { font-size: 14px; color: rgba(255,255,255,0.65); margin-top: 4px; }

        .content { max-width: 640px; margin: -28px auto 48px; padding: 0 40px; }
        .form-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
        .form-card-header { padding: 18px 24px; border-bottom: 1px solid #f5f5f5; }
        .form-card-header h3 { font-size: 15px; font-weight: 600; color: #1a237e; display: flex; align-items: center; gap: 8px; }
        .form-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

        .field label { display: block; font-size: 12px; font-weight: 700; color: #666; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
        .field input, .field textarea {
            width: 100%; padding: 11px 14px;
            border: 1px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; font-family: inherit; color: #333;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .field input:focus, .field textarea:focus { border-color: #3949ab; box-shadow: 0 0 0 3px rgba(57,73,171,0.1); }
        .field textarea { resize: vertical; min-height: 80px; }
        .field .hint { font-size: 11px; color: #aaa; margin-top: 5px; }

        .form-footer { padding: 16px 24px; border-top: 1px solid #f5f5f5; display: flex; gap: 10px; justify-content: flex-end; }
        .btn-submit { background: #1a237e; color: #fff; border: none; padding: 11px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: opacity 0.2s; text-decoration: none; }
        .btn-submit:hover { opacity: 0.88; }
        .btn-cancel { background: #f0f2f5; color: #666; border: none; padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 7px; transition: background 0.2s; }
        .btn-cancel:hover { background: #e0e0e0; }

        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
<nav>
    <span class="brand"><i class="ti ti-school"></i> UniSistema</span>
    <a th:href="@{/}"><i class="ti ti-home"></i> Início</a>
    <a th:href="@{/alunos}" class="active"><i class="ti ti-users"></i> Alunos</a>
    <a th:href="@{/materias}"><i class="ti ti-book"></i> Matérias</a>
    <a th:href="@{/turmas}"><i class="ti ti-chalkboard"></i> Turmas</a>
    <div class="nav-status"><span class="dot"></span> Sistema ativo · Porta 8081</div>
</nav>

<div class="page-header">
    <div class="page-header-inner">
        <div class="breadcrumb">
            <a th:href="@{/}">Início</a>
            <i class="ti ti-chevron-right" style="font-size:12px;"></i>
            <a th:href="@{/alunos}">Alunos</a>
            <i class="ti ti-chevron-right" style="font-size:12px;"></i>
            <span>Novo cadastro</span>
        </div>
        <h1><i class="ti ti-user-plus"></i> Cadastrar Aluno</h1>
        <p>Preencha os dados para registrar um novo aluno no sistema</p>
    </div>
</div>

<div class="content">
    <div th:if="${erro}" class="alert alert-error">
        <i class="ti ti-alert-circle"></i>
        <span th:text="${erro}"></span>
    </div>

    <div class="form-card">
        <div class="form-card-header">
            <h3><i class="ti ti-forms"></i> Dados do aluno</h3>
        </div>
        <form th:action="@{/alunos/salvar}" method="post">
            <div class="form-body">
                <div class="field">
                    <label>Nome completo *</label>
                    <input type="text" name="nome" th:value="${aluno?.nome}" placeholder="Ex: João da Silva" required>
                </div>
                <div class="field">
                    <label>Endereço *</label>
                    <input type="text" name="endereco" th:value="${aluno?.endereco}" placeholder="Ex: Rua das Flores, 123 – Fortaleza/CE" required>
                </div>
                <div class="field">
                    <label>Número de matrícula *</label>
                    <input type="text" name="matricula" th:value="${aluno?.matricula}" placeholder="Ex: 2024001" required>
                    <p class="hint">A matrícula deve ser única no sistema.</p>
                </div>
                <div class="field">
                    <label>Data de ingresso *</label>
                    <input type="date" name="dataIngresso" th:value="${aluno?.dataIngresso}" required>
                </div>
            </div>
            <div class="form-footer">
                <a th:href="@{/alunos}" class="btn-cancel"><i class="ti ti-arrow-left"></i> Cancelar</a>
                <button type="submit" class="btn-submit"><i class="ti ti-check"></i> Salvar aluno</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
