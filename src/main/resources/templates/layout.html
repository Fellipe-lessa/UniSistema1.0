<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Universitário</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }

        nav {
            background: #1a237e;
            padding: 0 30px;
            display: flex;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-right: 30px;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        nav a:hover { background: rgba(255,255,255,0.15); }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 40px; color: #90caf9; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        h1 { font-size: 24px; color: #1a237e; margin-bottom: 24px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 16px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input, select, textarea {
            width: 100%; padding: 10px 14px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; transition: border 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
        }
        textarea { resize: vertical; min-height: 100px; }

        .btn {
            padding: 10px 22px; border: none; border-radius: 6px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            text-decoration: none; display: inline-block; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-success { background: #2e7d32; color: #fff; }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-secondary { background: #546e7a; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1a237e; color: #fff; padding: 12px 14px; text-align: left; }
        td { padding: 11px 14px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f5f7ff; }

        .badge {
            padding: 4px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger  { background: #ffebee; color: #c62828; }

        .alert {
            padding: 12px 18px; border-radius: 6px;
            margin-bottom: 20px; font-size: 14px;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-danger  { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }

        .actions { display: flex; gap: 8px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
        .search-bar input { flex: 1; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>
