<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matérias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 40px; display: flex; align-items: center; height: 60px; gap: 32px; }
        nav .brand { font-size: 18px; font-weight: 600; color: #90caf9; margin-right: 16px; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .page-header { background: #1a237e; padding: 36px 40px 60px; }
        .page-header h1 { font-size: 28px; color: #fff; font-weight: 600; margin-bottom: 6px; }
        .page-header p { font-size: 14px; color: rgba(255,255,255,0.6); }
        .content { max-width: 960px; margin: -32px auto 40px; padding: 0 40px; }
        .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; padding: 28px; margin-bottom: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.88; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-secondary { background: #f0f2f5; color: #333; border: 0.5px solid #e0e0e0; }
        .btn-danger { background: #ffebee; color: #c62828; border: 0.5px solid #ffcdd2; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .actions { display: flex; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { border-bottom: 2px solid #e8eaf6; }
        th { padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 14px; border-bottom: 0.5px solid #f0f0f0; vertical-align: top; }
        tbody tr:hover td { background: #f5f7ff; }
        tbody tr:last-child td { border-bottom: none; }
        .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .alert-danger  { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .empty { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty i { font-size: 48px; margin-bottom: 12px; display: block; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-purple { background: #ede7f6; color: #512da8; }
        .ementa-cell { max-width: 380px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #666; font-size: 13px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="page-header">
    <h1>Matérias</h1>
    <p>Gerencie as disciplinas cadastradas no sistema</p>
</div>

<div class="content">
    <div class="card">
        <div class="top-bar">
            <div class="actions">
                <a th:href="@{/materias/consultar}" class="btn btn-secondary"><i class="ti ti-search"></i> Consultar por código</a>
                <a th:href="@{/materias/novo}" class="btn btn-primary"><i class="ti ti-plus"></i> Nova matéria</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success"><i class="ti ti-check"></i> <span th:text="${sucesso}"></span></div>
        <div th:if="${erro}" class="alert alert-danger"><i class="ti ti-alert-circle"></i> <span th:text="${erro}"></span></div>

        <div th:if="${materias != null and !materias.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Ementa</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${materias}">
                        <td><span class="badge badge-purple" th:text="${m.codigo}"></span></td>
                        <td style="font-weight:500" th:text="${m.nome}"></td>
                        <td class="ementa-cell" th:text="${m.ementa}"></td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/materias/consultar(codigo=${m.codigo})}" class="btn btn-secondary btn-sm"><i class="ti ti-eye"></i> Ver</a>
                                <form th:action="@{/materias/deletar/{id}(id=${m.id})}" method="post" onsubmit="return confirm('Confirma a exclusão?')">
                                    <button type="submit" class="btn btn-danger btn-sm"><i class="ti ti-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${materias == null or materias.isEmpty()}" class="empty">
            <i class="ti ti-book"></i>
            <p>Nenhuma matéria cadastrada ainda.</p>
        </div>
    </div>
</div>
</body>
</html>
