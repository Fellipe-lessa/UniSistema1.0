<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matérias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 30px; display: flex; align-items: center; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        nav a { color: #fff; text-decoration: none; margin-right: 30px; font-size: 15px; padding: 8px 14px; border-radius: 6px; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 40px; color: #90caf9; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        h1 { font-size: 24px; color: #1a237e; margin-bottom: 24px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 10px 22px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-secondary { background: #546e7a; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1a237e; color: #fff; padding: 12px 14px; text-align: left; }
        td { padding: 11px 14px; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:hover td { background: #f5f7ff; }
        .ementa { max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .actions { display: flex; gap: 8px; }
        .alert { padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-danger  { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
        .empty { text-align: center; padding: 40px; color: #999; font-size: 15px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="container">
    <div class="card">
        <div class="top-bar">
            <h1>📚 Matérias</h1>
            <div class="actions">
                <a th:href="@{/materias/consultar}" class="btn btn-secondary">🔍 Consultar por Código</a>
                <a th:href="@{/materias/novo}" class="btn btn-primary">+ Nova Matéria</a>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <div th:if="${materias != null and !materias.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Ementa</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${materias}">
                        <td th:text="${m.codigo}"></td>
                        <td th:text="${m.nome}"></td>
                        <td class="ementa" th:text="${m.ementa}"></td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/materias/consultar(codigo=${m.codigo})}" class="btn btn-secondary btn-sm">Ver</a>
                                <form th:action="@{/materias/deletar/{id}(id=${m.id})}" method="post"
                                      onsubmit="return confirm('Confirma a exclusão?')">
                                    <button type="submit" class="btn btn-danger btn-sm">Excluir</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${materias == null or materias.isEmpty()}" class="empty">
            Nenhuma matéria cadastrada ainda.
        </div>
    </div>
</div>
</body>
</html>
