<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultar Turma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 30px; display: flex; align-items: center; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        nav a { color: #fff; text-decoration: none; margin-right: 30px; font-size: 15px; padding: 8px 14px; border-radius: 6px; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 40px; color: #90caf9; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        h1 { font-size: 24px; color: #1a237e; margin-bottom: 24px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 16px; border-bottom: 2px solid #e8eaf6; padding-bottom: 10px; }
        .search-bar { display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px 22px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
        .info-item label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .info-item p { font-size: 15px; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1a237e; color: #fff; padding: 12px 14px; text-align: left; }
        td { padding: 11px 14px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f5f7ff; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger  { background: #ffebee; color: #c62828; }
        .badge-warn    { background: #fff8e1; color: #f57f17; }
        .alert { padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .alert-danger  { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
        .nota-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nota-form input { width: 65px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .nota-form button { padding: 5px 12px; background: #1a237e; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="container">
    <div class="card">
        <h1>🔍 Consultar Turma por Código</h1>
        <form th:action="@{/turmas/consultar}" method="get">
            <div class="search-bar">
                <input type="text" name="codigo" placeholder="Digite o código da turma..." required/>
                <button type="submit" class="btn btn-primary">Buscar</button>
            </div>
        </form>
        <div th:if="${erro}" class="alert alert-danger" style="margin-top:16px" th:text="${erro}"></div>
    </div>

    <div th:if="${turma != null}" class="card">
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <h2>📋 Dados da Turma</h2>
        <div class="info-grid">
            <div class="info-item">
                <label>Código</label>
                <p th:text="${turma.codigo}"></p>
            </div>
            <div class="info-item">
                <label>Descrição</label>
                <p th:text="${turma.descricao}"></p>
            </div>
            <div class="info-item">
                <label>Matéria</label>
                <p th:text="${turma.materiaNome}"></p>
            </div>
        </div>

        <h2> Alunos Matriculados</h2>
        <div th:if="${matriculas != null and !matriculas.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Média</th>
                        <th>Situação</th>
                        <th>Lançar Notas</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${matriculas}">
                        <td th:text="${m.alunoMatricula}"></td>
                        <td th:text="${m.alunoNome}"></td>
                        <td th:text="${m.nota1 != null ? m.nota1 : '-'}"></td>
                        <td th:text="${m.nota2 != null ? m.nota2 : '-'}"></td>
                        <td th:text="${m.nota3 != null ? m.nota3 : '-'}"></td>
                        <td th:text="${m.media != null ? #numbers.formatDecimal(m.media, 1, 2) : '-'}"></td>
                        <td>
                            <span th:if="${m.media == null}" class="badge badge-warn">Aguardando</span>
                            <span th:if="${m.media != null and m.aprovado}" class="badge badge-success">✅ Aprovado</span>
                            <span th:if="${m.media != null and !m.aprovado}" class="badge badge-danger">❌ Reprovado</span>
                        </td>
                        <td>
                            <form th:action="@{/turmas/notas}" method="post" class="nota-form">
                                <input type="hidden" name="matriculaId" th:value="${m.id}"/>
                                <input type="hidden" name="codigoTurma" th:value="${turma.codigo}"/>
                                <input type="number" name="nota1" step="0.01" min="0" max="10"
                                       th:value="${m.nota1}" placeholder="N1" required/>
                                <input type="number" name="nota2" step="0.01" min="0" max="10"
                                       th:value="${m.nota2}" placeholder="N2" required/>
                                <input type="number" name="nota3" step="0.01" min="0" max="10"
                                       th:value="${m.nota3}" placeholder="N3" required/>
                                <button type="submit">💾</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${matriculas == null or matriculas.isEmpty()}" style="color:#999; margin-top:10px;">
            Nenhum aluno matriculado nesta turma ainda.
            <a th:href="@{/turmas/{id}/matricular(id=${turma.id})}" style="color:#1a237e; margin-left:8px;">Matricular aluno →</a>
        </p>
    </div>
</div>
</body>
</html>
