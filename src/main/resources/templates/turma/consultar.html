<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultar Turma</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 40px; display: flex; align-items: center; height: 60px; gap: 32px; }
        nav .brand { font-size: 18px; font-weight: 600; color: #90caf9; margin-right: 16px; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        .page-header { background: #1a237e; padding: 36px 40px 60px; }
        .page-header h1 { font-size: 28px; color: #fff; font-weight: 600; margin-bottom: 6px; }
        .page-header p { font-size: 14px; color: rgba(255,255,255,0.6); }
        .content { max-width: 1000px; margin: -32px auto 40px; padding: 0 40px; }
        .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; padding: 28px; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; }
        .search-bar input { flex: 1; padding: 11px 14px; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; }
        .search-bar input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.08); background: #fff; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.88; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; font-weight: 600; }
        .alert { padding: 12px 18px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .alert-danger  { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .turma-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 0.5px solid #eee; }
        .turma-icon { width: 56px; height: 56px; border-radius: 12px; background: #e8f5e9; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #2e7d32; }
        .turma-info h2 { font-size: 20px; font-weight: 600; color: #1a237e; }
        .turma-info p { font-size: 13px; color: #888; margin-top: 3px; }
        .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
        .info-item { background: #f8f9ff; border-radius: 8px; padding: 14px 16px; }
        .info-item label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
        .info-item p { font-size: 14px; color: #333; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { border-bottom: 2px solid #e8eaf6; }
        th { padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px 14px; border-bottom: 0.5px solid #f0f0f0; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f5f7ff; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger  { background: #ffebee; color: #c62828; }
        .badge-warn    { background: #fff8e1; color: #f57f17; }
        .nota-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nota-form input { width: 62px; padding: 5px 8px; border: 0.5px solid #ddd; border-radius: 6px; font-size: 13px; text-align: center; }
        .nota-form input:focus { outline: none; border-color: #1a237e; }
        .nota-form button { padding: 5px 12px; background: #1a237e; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .nota-form button:hover { opacity: 0.88; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="page-header">
    <h1>Consultar Turma</h1>
    <p>Busque uma turma pelo código</p>
</div>

<div class="content">
    <div class="card">
        <form th:action="@{/turmas/consultar}" method="get">
            <div class="search-bar">
                <input type="text" name="codigo" placeholder="Digite o código da turma..." required/>
                <button type="submit" class="btn btn-primary"><i class="ti ti-search"></i> Buscar</button>
            </div>
        </form>
        <div th:if="${erro}" class="alert alert-danger" style="margin-top:16px"><i class="ti ti-alert-circle"></i> <span th:text="${erro}"></span></div>
    </div>

    <div th:if="${turma != null}" class="card">
        <div th:if="${sucesso}" class="alert alert-success" style="margin-bottom:20px"><i class="ti ti-check"></i> <span th:text="${sucesso}"></span></div>

        <div class="turma-header">
            <div class="turma-icon"><i class="ti ti-school"></i></div>
            <div class="turma-info">
                <h2 th:text="${turma.codigo}"></h2>
                <p th:text="${turma.descricao}"></p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>Código</label>
                <p th:text="${turma.codigo}"></p>
            </div>
            <div class="info-item">
                <label>Descrição</label>
                <p th:text="${turma.descricao ?: 'Não informada'}"></p>
            </div>
            <div class="info-item">
                <label>Matéria</label>
                <p th:text="${turma.materiaNome}"></p>
            </div>
        </div>

        <div class="section-title"><i class="ti ti-users"></i> Alunos Matriculados</div>

        <div th:if="${matriculas != null and !matriculas.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Média</th>
                        <th>Situação</th>
                        <th>Lançar Notas</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${matriculas}">
                        <td th:text="${m.alunoMatricula}"></td>
                        <td style="font-weight:500" th:text="${m.alunoNome}"></td>
                        <td th:text="${m.nota1 != null ? m.nota1 : '-'}"></td>
                        <td th:text="${m.nota2 != null ? m.nota2 : '-'}"></td>
                        <td th:text="${m.nota3 != null ? m.nota3 : '-'}"></td>
                        <td th:text="${m.media != null ? #numbers.formatDecimal(m.media,1,2) : '-'}"></td>
                        <td>
                            <span th:if="${m.media == null}" class="badge badge-warn">Aguardando</span>
                            <span th:if="${m.media != null and m.aprovado}" class="badge badge-success">✓ Aprovado</span>
                            <span th:if="${m.media != null and !m.aprovado}" class="badge badge-danger">✗ Reprovado</span>
                        </td>
                        <td>
                            <form th:action="@{/turmas/notas}" method="post" class="nota-form">
                                <input type="hidden" name="matriculaId" th:value="${m.id}"/>
                                <input type="hidden" name="codigoTurma" th:value="${turma.codigo}"/>
                                <input type="number" name="nota1" step="0.01" min="0" max="10" th:value="${m.nota1}" placeholder="N1" required/>
                                <input type="number" name="nota2" step="0.01" min="0" max="10" th:value="${m.nota2}" placeholder="N2" required/>
                                <input type="number" name="nota3" step="0.01" min="0" max="10" th:value="${m.nota3}" placeholder="N3" required/>
                                <button type="submit"><i class="ti ti-device-floppy"></i> Salvar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${matriculas == null or matriculas.isEmpty()}" style="color:#aaa;font-size:14px;padding:20px 0">
            Nenhum aluno matriculado nesta turma ainda.
            <a th:href="@{/turmas/{id}/matricular(id=${turma.id})}" style="color:#1a237e;margin-left:8px;font-weight:600">Matricular aluno →</a>
        </p>
    </div>
</div>
</body>
</html>
