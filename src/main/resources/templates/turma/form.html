<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Turma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 30px; display: flex; align-items: center; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        nav a { color: #fff; text-decoration: none; margin-right: 30px; font-size: 15px; padding: 8px 14px; border-radius: 6px; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 40px; color: #90caf9; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; color: #1a237e; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border 0.2s; }
        input:focus, select:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 22px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-secondary { background: #546e7a; color: #fff; }
        .alert { padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-danger { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="container">
    <div class="card">
        <h1> Cadastrar Turma</h1>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <form th:action="@{/turmas/salvar}" method="post">
            <div class="form-group">
                <label>Código da Turma *</label>
                <input type="text" name="codigo" required placeholder="Ex: TUR2024-A"/>
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <input type="text" name="descricao" placeholder="Ex: Turma A - Noturno"/>
            </div>
            <div class="form-group">
                <label>Matéria *</label>
                <select name="materiaId" required>
                    <option value="">Selecione uma matéria...</option>
                    <option th:each="m : ${materias}" th:value="${m.id}" th:text="${m.codigo + ' - ' + m.nome}"></option>
                </select>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a th:href="@{/turmas}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
