<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matricular Aluno</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #1a237e; padding: 0 30px; display: flex; align-items: center; height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        nav a { color: #fff; text-decoration: none; margin-right: 30px; font-size: 15px; padding: 8px 14px; border-radius: 6px; }
        nav a:hover { background: rgba(255,255,255,0.15); }
        nav .brand { font-size: 18px; font-weight: bold; margin-right: 40px; color: #90caf9; }
        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 10px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; color: #1a237e; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        select:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 22px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a237e; color: #fff; }
        .btn-secondary { background: #546e7a; color: #fff; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🎓 UniSistema</span>
    <a th:href="@{/}">Início</a>
    <a th:href="@{/alunos}">Alunos</a>
    <a th:href="@{/materias}">Matérias</a>
    <a th:href="@{/turmas}">Turmas</a>
</nav>

<div class="container">
    <div class="card">
        <h1>📋 Matricular Aluno</h1>
        <p class="subtitle" th:if="${turma != null}">
            Turma: <strong th:text="${turma.codigo}"></strong>
        </p>

        <form th:action="@{/turmas/matricular}" method="post">
            <input type="hidden" name="turmaId" th:value="${turmaId}"/>
            <div class="form-group">
                <label>Selecione o Aluno *</label>
                <select name="alunoId" required>
                    <option value="">Selecione um aluno...</option>
                    <option th:each="a : ${alunos}"
                            th:value="${a.id}"
                            th:text="${a.matricula + ' - ' + a.nome}"></option>
                </select>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">Matricular</button>
                <a th:href="@{/turmas}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
